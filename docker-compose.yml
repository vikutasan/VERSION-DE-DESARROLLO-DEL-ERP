services:
  db:
    image: postgres:15-alpine
    container_name: rderico-db-dev
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rderico
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - "${DB_DATA_PATH:-./data/postgres}:/var/lib/postgresql/data"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: rderico-api-dev
    restart: always
    ports:
      - "${API_PORT:-5001}:3001"
    volumes:
      - ./apps/api:/app
      - "${IMAGES_DATA_PATH:-./data/images}:/app/static/catalog"
    environment:
      - DATABASE_URL=postgresql+asyncpg://user:password@db:5432/rderico
      - PORT=3001
    depends_on:
      - db

  pos:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: rderico-pos-dev
    restart: always
    ports:
      - "${POS_PORT:-5000}:3000"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://192.168.1.117:5001

# Volúmenes eliminados como named volumes para usar rutas de host directas
